<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Beep — Stay on top of it</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════
   BEEP — Design System v2
   Font: Outfit (modern geometric sans)
   Palette: deep indigo primary, vivid accents
   Style: clean, airy, premium SaaS
══════════════════════════════════════════════ */
:root{
  /* Brand */
  --p:#5b4cf5;--p2:#7c6ff7;--p3:#a594f9;--pd:#4338d4;
  --pb:#eeecfe;--pb2:#e0ddfd;
  /* Semantic */
  --g:#10b981;--gb:#d1fae5;--gd:#059669;
  --r:#ef4444;--rb:#fee2e2;--rd:#dc2626;
  --y:#f59e0b;--yb:#fef3c7;
  --b:#3b82f6;--bb:#dbeafe;
  --acc:#f97316;--acc2:#8b5cf6;
  /* Neutrals */
  --bg:#f8f7ff;--s:#ffffff;--s2:#f3f2ff;--s3:#ebe9fc;
  --bd:#e4e2f5;--bd2:#ccc9ee;
  --t:#0f0d2a;--t2:#4a4870;--t3:#8e8cb0;--t4:#c4c2dc;
  /* Sidebar */
  --sb-bg:#0f0d2a;--sb-act:#5b4cf5;--sb-t:#c4c2dc;--sb-t2:#ffffff;
  /* Layout */
  --sw:256px;
  --rr:16px;--rs:10px;--rxl:24px;
  /* Shadows */
  --sh-xs:0 1px 2px rgba(15,13,42,.04);
  --sh-sm:0 2px 8px rgba(15,13,42,.06),0 1px 2px rgba(15,13,42,.04);
  --sh-md:0 4px 16px rgba(15,13,42,.08),0 2px 6px rgba(15,13,42,.04);
  --sh-lg:0 12px 32px rgba(15,13,42,.12),0 4px 12px rgba(15,13,42,.06);
  --sh-xl:0 24px 56px rgba(15,13,42,.18),0 8px 20px rgba(15,13,42,.08);
  --sh-glow:0 0 0 3px rgba(91,76,245,.18),0 0 0 1px rgba(91,76,245,.35);
  /* Gradients */
  --grad-p:linear-gradient(135deg,#5b4cf5 0%,#7c6ff7 60%,#a594f9 100%);
  --grad-warm:linear-gradient(135deg,#f97316 0%,#f59e0b 100%);
  --grad-cool:linear-gradient(135deg,#3b82f6 0%,#5b4cf5 100%);
  --grad-mint:linear-gradient(135deg,#10b981 0%,#3b82f6 100%);
  --grad-dark:linear-gradient(135deg,#0f0d2a 0%,#1e1b4b 100%);
  /* Animation */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur:180ms;
}
[data-theme=dark]{
  --bg:#08071a;--s:#0f0d2a;--s2:#161430;--s3:#1e1b3a;
  --bd:#2a2750;--bd2:#3d3a68;
  --t:#f0efff;--t2:#9896c0;--t3:#5e5c88;--t4:#3a3860;
  --pb:#1e1b3a;--pb2:#2a2654;
  --gb:#052e16;--rb:#1c0505;--yb:#1c1004;--bb:#0c1a3a;
  --sb-bg:#08071a;
  --sh-sm:0 2px 8px rgba(0,0,0,.35);
  --sh-md:0 4px 16px rgba(0,0,0,.45);
  --sh-lg:0 12px 32px rgba(0,0,0,.55);
  --sh-xl:0 24px 56px rgba(0,0,0,.65);
}

/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;text-size-adjust:100%}
body{
  font-family:'Outfit',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--t);line-height:1.6;
  font-size:15px;font-weight:400;
  transition:background var(--dur) var(--ease),color var(--dur) var(--ease);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;letter-spacing:-.025em;line-height:1.25;font-weight:700}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
input,textarea,select{font-family:inherit;border:none;outline:none}
*{scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
::selection{background:var(--p);color:#fff}

/* ── Layout ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:var(--sw);background:var(--sb-bg);
  position:fixed;height:100vh;display:flex;flex-direction:column;
  z-index:100;transition:transform var(--dur) var(--ease);
  border-right:1px solid rgba(255,255,255,.06);
}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%);box-shadow:var(--sh-xl)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .burger{display:flex!important}
}

/* ── Sidebar ── */
.slogo{padding:24px 20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.slogo-ico{
  width:38px;height:38px;background:var(--grad-p);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(91,76,245,.45);flex-shrink:0;
}
.slogo-t{font-weight:800;font-size:1.05rem;letter-spacing:-.03em;color:#fff}
.slogo-s{font-size:.62rem;color:var(--sb-t);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-top:1px}
.snav{flex:1;padding:12px 10px;overflow-y:auto}
.snav-sec{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.25);padding:16px 10px 6px;
}
.snav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:11px;color:var(--sb-t);font-size:.875rem;font-weight:500;
  cursor:pointer;margin-bottom:2px;transition:all var(--dur) var(--ease);
  position:relative;
}
.snav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.snav-item.on{background:rgba(91,76,245,.25);color:#fff;font-weight:600}
.snav-item.on::before{
  content:'';position:absolute;left:0;top:25%;bottom:25%;
  width:3px;background:var(--grad-p);border-radius:0 3px 3px 0;
}
.snav-ico{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.sbadge{
  margin-left:auto;background:var(--p);color:#fff;
  font-size:.62rem;font-weight:700;padding:2px 7px;
  border-radius:99px;min-width:18px;text-align:center;line-height:1.6;
}
.sfoot{padding:12px 10px 16px;border-top:1px solid rgba(255,255,255,.07)}
.suser{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:11px;cursor:pointer;transition:background var(--dur) var(--ease);
}
.suser:hover{background:rgba(255,255,255,.08)}
.av{
  width:34px;height:34px;border-radius:10px;background:var(--grad-warm);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0;
}
.uname{font-weight:600;font-size:.84rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uemail{font-size:.68rem;color:var(--sb-t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Topbar ── */
.topbar{
  height:60px;background:rgba(255,255,255,.8);
  backdrop-filter:blur(20px) saturate(200%);-webkit-backdrop-filter:blur(20px) saturate(200%);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 24px;gap:10px;
  position:sticky;top:0;z-index:50;
}
[data-theme=dark] .topbar{background:rgba(15,13,42,.8);border-color:var(--bd)}
.tbtitle{font-weight:700;font-size:1rem;flex:1;letter-spacing:-.02em;color:var(--t)}
.burger{
  width:36px;height:36px;border-radius:9px;background:var(--s2);
  border:1px solid var(--bd);display:none;align-items:center;
  justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);
}
.tbb{
  width:36px;height:36px;border-radius:9px;background:transparent;
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:var(--t2);
  transition:all var(--dur) var(--ease);position:relative;
}
.tbb:hover{background:var(--pb);color:var(--p);border-color:var(--p)}
.ndot{
  width:7px;height:7px;background:var(--r);border-radius:50%;
  position:absolute;top:5px;right:5px;border:2px solid var(--s);
  animation:pulseDot 2s ease infinite;
}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* ── Page ── */
.page{padding:28px 28px 72px;animation:pgin .3s var(--ease-out)}
@keyframes pgin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.ptitle{font-size:1.65rem;font-weight:800;letter-spacing:-.035em;color:var(--t)}
.psub{font-size:.84rem;color:var(--t2);margin-top:3px;font-weight:400}

/* ── Card ── */
.card{
  background:var(--s);border:1px solid var(--bd);
  border-radius:var(--rr);padding:22px;
  box-shadow:var(--sh-sm);
  transition:box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease);
}
.hov:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ct{font-weight:700;font-size:.92rem;letter-spacing:-.015em}

/* ── Stat cards ── */
.statg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px}
.statc{
  background:var(--s);border:1px solid var(--bd);border-radius:var(--rr);
  padding:20px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--sh-xs);transition:all .22s var(--ease);position:relative;overflow:hidden;
}
.statc::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(91,76,245,.03) 0%,transparent 60%);
  pointer-events:none;
}
.statc:hover{box-shadow:var(--sh-md);transform:translateY(-3px)}
.stico{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.stlbl{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:4px}
.stval{font-size:1.8rem;font-weight:800;line-height:1;letter-spacing:-.04em}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:var(--rs);font-size:.84rem;
  font-weight:600;cursor:pointer;border:1.5px solid transparent;
  white-space:nowrap;transition:all var(--dur) var(--ease);
  font-family:'Outfit',sans-serif;letter-spacing:-.01em;
}
.btn:active{transform:scale(.96)}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:8px}
.btn-lg{padding:12px 22px;font-size:.92rem;border-radius:12px}
.bp{background:var(--grad-p);color:#fff;box-shadow:0 3px 10px rgba(91,76,245,.3)}
.bp:hover{box-shadow:0 6px 18px rgba(91,76,245,.45);transform:translateY(-1px)}
.bs{background:var(--s2);color:var(--t2);border-color:var(--bd)}
.bs:hover{background:var(--s3);color:var(--t);border-color:var(--bd2)}
.be{background:var(--r);color:#fff;box-shadow:0 3px 10px rgba(239,68,68,.2)}
.be:hover{background:var(--rd);box-shadow:0 6px 16px rgba(239,68,68,.35)}
.bg2{background:var(--g);color:#fff}
.bg2:hover{background:var(--gd);box-shadow:0 6px 16px rgba(16,185,129,.3)}
.bo{background:transparent;border-color:var(--bd);color:var(--t2)}
.bo:hover{border-color:var(--p);color:var(--p);background:var(--pb)}
.bgh{background:transparent;color:var(--t2)}
.bgh:hover{background:var(--s2);color:var(--t)}
.w100{width:100%;justify-content:center}
.fab{
  position:fixed;bottom:28px;right:28px;width:54px;height:54px;
  border-radius:16px;background:var(--grad-p);color:#fff;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(91,76,245,.45);cursor:pointer;z-index:200;
  transition:all .22s var(--ease-spring);border:none;
}
.fab:hover{transform:scale(1.1) rotate(6deg);box-shadow:0 12px 32px rgba(91,76,245,.55)}
.fab:active{transform:scale(.95)}

/* ── Forms ── */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.7rem;font-weight:700;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.fi{
  width:100%;background:var(--s2);border:1.5px solid var(--bd);
  border-radius:var(--rs);padding:11px 14px;font-size:.88rem;color:var(--t);
  transition:all var(--dur) var(--ease);font-family:'Outfit',sans-serif;font-weight:400;
}
.fi:focus{border-color:var(--p);background:var(--s);box-shadow:var(--sh-glow)}
.fi::placeholder{color:var(--t4)}
textarea.fi{resize:vertical;min-height:80px;line-height:1.6}
select.fi{cursor:pointer}
select.fi option{background:var(--s);color:var(--t)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ferr{font-size:.74rem;color:var(--r);margin-top:4px;font-weight:600}

/* ── Modal ── */
.msk{
  position:fixed;inset:0;background:rgba(8,7,26,.6);
  backdrop-filter:blur(8px);z-index:1000;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px;overflow-y:auto;
}
.modal{
  background:var(--s);border-radius:22px;box-shadow:var(--sh-xl);
  width:100%;max-width:580px;animation:mboxin .25s var(--ease-spring);margin:auto;
  border:1px solid var(--bd);
}
.modal-lg{max-width:760px}
.modal-sm{max-width:420px}
.modal-xl{max-width:960px}
@keyframes mboxin{from{opacity:0;transform:translateY(-20px) scale(.96)}to{opacity:1;transform:none}}
.mh{
  padding:20px 24px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.mt{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.mb2{padding:20px 24px}
.mf{
  padding:14px 24px;border-top:1px solid var(--bd);
  display:flex;justify-content:flex-end;gap:10px;background:var(--s2);
  border-radius:0 0 22px 22px;
}

/* ── Badges ── */
.b{
  display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:99px;font-size:.63rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;line-height:1.5;
}
.b-p{background:var(--pb);color:var(--p)}
.b-g{background:var(--gb);color:var(--gd)}
.b-r{background:var(--rb);color:var(--rd)}
.b-y{background:var(--yb);color:#b45309}
.b-b{background:var(--bb);color:#1d4ed8}
.b-gr{background:var(--s2);color:var(--t2)}
.b-lo{background:var(--gb);color:var(--gd)}
.b-me{background:var(--yb);color:#b45309}
.b-hi{background:var(--rb);color:var(--rd)}
.b-ok{background:var(--gb);color:var(--gd)}

/* ── Progress ── */
.pw{background:var(--bd);border-radius:99px;height:5px;overflow:hidden}
.pb3{height:100%;border-radius:99px;background:var(--grad-p);transition:width .5s var(--ease)}
.pb3.g{background:var(--grad-mint)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:11px;padding:3px;border:1px solid var(--bd)}
.tab{
  padding:7px 14px;border-radius:9px;font-size:.8rem;font-weight:600;
  color:var(--t3);cursor:pointer;transition:all var(--dur) var(--ease);
  white-space:nowrap;letter-spacing:-.01em;
}
.tab:hover{color:var(--t)}
.tab.on{background:var(--s);color:var(--p);font-weight:700;box-shadow:var(--sh-sm)}

/* ── Event card ── */
.evc{
  background:var(--s);border:1px solid var(--bd);border-radius:var(--rr);
  padding:16px 18px;border-left:4px solid;transition:all var(--dur) var(--ease);
}
.evc:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.ech{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.etitle{font-weight:700;font-size:.9rem;letter-spacing:-.01em;flex:1}
.emeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.emi{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--t3);font-weight:500}

/* ── Task item ── */
.ti{
  background:var(--s);border:1px solid var(--bd);border-radius:13px;
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
  transition:all var(--dur) var(--ease);
}
.ti:hover{border-color:var(--p);box-shadow:var(--sh-sm)}
.ti.completed{opacity:.5}
.tck{
  width:21px;height:21px;border-radius:50%;border:2px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;transition:all var(--dur) var(--ease-spring);
  margin-top:1px;font-size:10px;color:#fff;
}
.tck:hover{transform:scale(1.15);border-color:var(--p)}
.tck.dn{background:var(--g);border-color:var(--g)}
.tck.ip{background:var(--b);border-color:var(--b)}
.tbdy{flex:1;min-width:0}
.ttl{font-weight:600;font-size:.88rem;letter-spacing:-.01em}
.ttl.cr{text-decoration:line-through;color:var(--t3)}
.tdsc{font-size:.77rem;color:var(--t2);margin-top:3px;line-height:1.55}
.tmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.tact{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity var(--dur) var(--ease)}
.ti:hover .tact{opacity:1}

/* ── Subtasks ── */
.sublistFull{margin-top:10px;padding-left:10px;border-left:2px solid var(--pb2);display:flex;flex-direction:column;gap:8px}
.subcard{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:10px 13px}
.subcard-top{display:flex;align-items:center;gap:8px}
.subEditor{border:1px solid var(--bd);border-radius:13px;overflow:hidden;background:var(--s2)}
.subEditor-head{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;background:var(--s2)}
.subEditor-body{padding:14px 16px 16px;border-top:1px solid var(--bd);background:var(--s);display:flex;flex-direction:column;gap:0}
.subEditor-body .fg{margin-top:12px;margin-bottom:0}
.subck{
  width:16px;height:16px;border-radius:5px;border:2px solid var(--bd2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:10px;color:#fff;
  transition:all var(--dur) var(--ease);
}
.subck.dn{background:var(--g);border-color:var(--g)}

/* ── Calendar ── */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldn{
  text-align:center;font-size:.62rem;font-weight:700;color:var(--t3);
  padding:8px;text-transform:uppercase;letter-spacing:.07em;
}
.calc{
  min-height:80px;padding:8px 7px;border-radius:12px;background:var(--s2);
  border:1.5px solid transparent;cursor:pointer;transition:all var(--dur) var(--ease);
}
.calc:hover{border-color:var(--p);background:var(--pb);transform:translateY(-1px)}
.calc.today{border-color:var(--p);background:var(--pb)}
.calc.today .caldate{color:var(--p);font-weight:800}
.calc.other{opacity:.28}
.calc.sel{background:var(--grad-p);box-shadow:0 6px 18px rgba(91,76,245,.3)}
.calc.sel .caldate{color:#fff}
.caldate{font-size:.75rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
.calev{
  font-size:.57rem;padding:2px 5px;border-radius:5px;
  white-space:nowrap;overflow:hidden;max-width:100%;
  margin-bottom:2px;font-weight:600;
}
.calTaskChip{
  font-size:.58rem;padding:2px 5px;border-radius:5px;
  background:var(--s);border:1px solid var(--bd);color:var(--t2);
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;transition:all .15s var(--ease);font-weight:600;
}
.calTaskChip:hover{border-color:var(--p);color:var(--p)}

/* ── Hour-level drill-down ── */
.hourGrid{display:grid;grid-template-columns:54px 1fr;position:relative}
.hourLabel{font-size:.65rem;color:var(--t3);text-align:right;padding-right:10px;position:relative;top:-7px;font-weight:600}
.hourRow{border-top:1px solid var(--bd);min-height:56px;position:relative;cursor:pointer;transition:background .12s}
.hourRow:hover{background:var(--s2)}
.hourBlock{
  position:absolute;left:4px;right:4px;border-radius:9px;padding:5px 9px;
  font-size:.73rem;font-weight:600;cursor:pointer;overflow:hidden;
  box-shadow:var(--sh-sm);transition:all var(--dur) var(--ease);z-index:2;border-left:3px solid;
}
.hourBlock:hover{box-shadow:var(--sh-md);z-index:5;transform:scale(1.015)}
.hourBlock .hbTime{font-size:.62rem;font-weight:600;opacity:.8}
.nowLine{position:absolute;left:0;right:0;height:2px;background:var(--r);z-index:10;pointer-events:none}
.nowLine::before{
  content:'';position:absolute;left:-5px;top:-4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--r);box-shadow:0 0 0 3px rgba(239,68,68,.2);
}
.dayHourWrap{max-height:540px;overflow-y:auto;border-radius:var(--rr);background:var(--s);border:1px solid var(--bd)}
.unscheduledBar{display:flex;gap:7px;flex-wrap:wrap;padding:11px 14px;background:var(--s2);border-radius:12px;margin-bottom:14px}
.unschedChip{
  display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:99px;
  background:var(--s);border:1px solid var(--bd);font-size:.74rem;
  font-weight:600;cursor:pointer;transition:all .15s;
}
.unschedChip:hover{border-color:var(--p);color:var(--p)}

/* ── Voice ── */
.vrec{background:var(--s2);border:1.5px dashed var(--bd2);border-radius:14px;padding:18px;text-align:center}
.vrec.rec{border-color:var(--r);background:var(--rb);animation:pulseBorder 1.4s ease infinite}
@keyframes pulseBorder{0%,100%{border-color:var(--r)}50%{border-color:var(--acc)}}
.waves{display:flex;align-items:center;justify-content:center;gap:3px;height:36px;margin:9px 0}
.wv{width:3px;background:var(--r);border-radius:99px;animation:wva .7s ease infinite}
.wv:nth-child(1){height:10px;animation-delay:0s}.wv:nth-child(2){height:22px;animation-delay:.1s}
.wv:nth-child(3){height:30px;animation-delay:.2s}.wv:nth-child(4){height:18px;animation-delay:.3s}
.wv:nth-child(5){height:26px;animation-delay:.4s}.wv:nth-child(6){height:14px;animation-delay:.5s}
.wv:nth-child(7){height:22px;animation-delay:.6s}
@keyframes wva{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.vp{background:var(--s2);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.vtr{flex:1;height:4px;background:var(--bd);border-radius:99px;cursor:pointer}
.vfi{height:100%;border-radius:99px;background:var(--grad-p)}

/* ── Reminder popup ── */
.remov{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,7,26,.85);backdrop-filter:blur(12px);
}
.remc{
  background:var(--s);border-radius:28px;padding:36px;
  max-width:440px;width:92%;text-align:center;
  box-shadow:var(--sh-xl);border:1.5px solid var(--p);
  animation:remIn .4s var(--ease-spring);
}
@keyframes remIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.bell{font-size:52px;display:inline-block;animation:bela .45s ease infinite alternate}
@keyframes bela{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}
.alarmt{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--r),var(--acc),var(--p),var(--r));
  background-size:300%;animation:alb 1.2s linear infinite;z-index:9998;
}
@keyframes alb{0%{background-position:0%}100%{background-position:300%}}
.snopts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:12px 0}
.snopt{
  padding:9px 6px;border-radius:10px;border:1.5px solid var(--bd);
  font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;
  transition:all var(--dur) var(--ease);color:var(--t2);
}
.snopt:hover{border-color:var(--p);background:var(--pb);color:var(--p);transform:translateY(-1px)}
.remBreadcrumb{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:5px;
  margin-bottom:18px;padding:8px 12px;background:var(--s2);border-radius:10px;
}
.crumb{font-size:.7rem;font-weight:700;color:var(--t2);padding:2px 7px;border-radius:6px}
.crumb-active{color:var(--p);background:var(--pb)}
.crumb-sep{color:var(--t3);font-size:.68rem}

/* ── Reminder chain ── */
.remHierarchy{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:13px}
.remChainRow{display:flex;align-items:center;gap:9px;padding:4px 0}
.remChainRow.active .remChainLabel{font-weight:700;color:var(--p)}
.remChainRow.sub{padding:2px 0}
.remChainIco{font-size:13px;width:18px;text-align:center}
.remChainLabel{font-size:.83rem;color:var(--t);flex:1}
.remChainArrow{font-size:11px;color:var(--t3);margin-left:10px}

/* ── Auth ── */
.authwrap{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;overflow:hidden;
  background:linear-gradient(145deg,#0f0d2a 0%,#1a1640 40%,#0d1a3a 100%);
}
.authwrap::before{
  content:'';position:absolute;width:700px;height:700px;
  background:radial-gradient(circle,rgba(91,76,245,.3) 0%,transparent 70%);
  border-radius:50%;top:-200px;right:-200px;pointer-events:none;
}
.authwrap::after{
  content:'';position:absolute;width:500px;height:500px;
  background:radial-gradient(circle,rgba(59,130,246,.2) 0%,transparent 70%);
  border-radius:50%;bottom:-150px;left:-150px;pointer-events:none;
}
.acard{
  background:rgba(255,255,255,.97);border-radius:24px;padding:40px;
  width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.4);
  position:relative;z-index:1;border:1px solid rgba(255,255,255,.2);
}
[data-theme=dark] .acard{background:var(--s);border-color:var(--bd)}
.atitle{font-size:1.55rem;font-weight:800;text-align:center;margin-bottom:5px;letter-spacing:-.035em;color:var(--t)}
.asub{font-size:.84rem;color:var(--t2);text-align:center;margin-bottom:26px}
.divider{display:flex;align-items:center;gap:11px;margin:16px 0;color:var(--t3);font-size:.75rem;font-weight:600}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--bd)}
.authLogoWrap{
  width:60px;height:60px;background:var(--grad-p);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;box-shadow:0 10px 28px rgba(91,76,245,.45);
}

/* ── OTP screen ── */
.otpDevBox{border-radius:12px;padding:14px 16px}
.flex-1{flex:1}

/* ── Profile ── */
.proav{
  width:78px;height:78px;border-radius:22px;background:var(--grad-warm);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:800;color:#fff;margin:0 auto 12px;
  box-shadow:0 10px 28px rgba(249,115,22,.35);
}
.tog{width:40px;height:22px;border-radius:99px;cursor:pointer;position:relative;transition:background var(--dur) var(--ease);flex-shrink:0}
.tog-knob{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left var(--dur) var(--ease-spring);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.barrow{display:grid;grid-template-columns:104px 1fr 38px;align-items:center;gap:10px;font-size:.77rem}

/* ── Chips ── */
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  border-radius:99px;font-size:.73rem;font-weight:600;cursor:pointer;
  border:1.5px solid transparent;transition:all var(--dur) var(--ease);
}
.chip.on{border-color:currentColor;transform:scale(1.03)}
.swatches{display:flex;flex-wrap:wrap;gap:6px}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--dur) var(--ease-spring)}
.sw.on{border-color:var(--t);transform:scale(1.2)}
.icog{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;max-height:104px;overflow-y:auto}
.icoo{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:1.5px solid var(--bd);transition:all .15s}
.icoo:hover,.icoo.on{border-color:var(--p);background:var(--pb)}
.dr{position:relative}
.drm{position:absolute;top:calc(100% + 8px);right:0;background:var(--s);border:1px solid var(--bd);border-radius:14px;box-shadow:var(--sh-lg);min-width:275px;z-index:300;animation:mboxin .18s var(--ease)}
.dri{display:flex;align-items:center;gap:9px;padding:10px 15px;font-size:.82rem;color:var(--t2);cursor:pointer;transition:all .15s;border-radius:8px;margin:4px}
.dri:hover{background:var(--s2);color:var(--t)}

/* ── Ringtone picker ── */
.ringtoneGrid{display:flex;flex-direction:column;gap:7px;margin-top:7px}
.ringtoneOpt{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:11px;border:1.5px solid var(--bd);background:var(--s2);cursor:pointer;transition:all var(--dur) var(--ease)}
.ringtoneOpt:hover{border-color:var(--p)}
.ringtoneOpt.on{border-color:var(--p);background:var(--pb)}
.ringtoneOpt.sm{padding:7px 9px}
.rtPicker{display:flex;flex-direction:column;gap:10px}
.rtSelected{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--pb);border:1.5px solid var(--p);border-radius:12px}
.rtSelectedIco{font-size:20px;flex-shrink:0}
.rtSelectedName{font-weight:700;font-size:.86rem;color:var(--p)}
.rtSelectedDesc{font-size:.7rem;color:var(--t2);margin-top:1px}
.rtGroups{display:flex;gap:4px;flex-wrap:wrap}
.rtGroupTab{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:.76rem;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);color:var(--t2);transition:all .15s var(--ease);background:var(--s2)}
.rtGroupTab:hover{border-color:var(--p);color:var(--p)}
.rtGroupTab.active{background:var(--grad-p);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(91,76,245,.25)}
.rtTileGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px}
.rtTile{padding:11px 12px;border-radius:12px;border:1.5px solid var(--bd);background:var(--s2);cursor:pointer;transition:all var(--dur) var(--ease);position:relative}
.rtTile:hover{border-color:var(--p);background:var(--pb);transform:translateY(-1px)}
.rtTile.sel{border-color:var(--p);background:var(--pb);box-shadow:0 0 0 3px rgba(91,76,245,.1)}
.rtTile.sel::after{content:'✓';position:absolute;top:7px;right:8px;font-size:.62rem;font-weight:800;color:var(--p)}
.rtTileTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rtTileIco{font-size:20px}
.rtTileName{font-size:.78rem;font-weight:700;color:var(--t);margin-bottom:2px}
.rtTileDesc{font-size:.66rem;color:var(--t3)}
.rtPreviewBtn{width:22px;height:22px;border-radius:50%;background:var(--s);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s;flex-shrink:0}
.rtPreviewBtn:hover{background:var(--p);border-color:var(--p);color:#fff}
.rtPickerCompact{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:6px;margin-top:6px}
.rtTileSmall{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .15s;position:relative}
.rtTileSmall:hover{border-color:var(--p)}
.rtTileSmall.sel{border-color:var(--p);background:var(--pb)}
.rtTileLbl{font-size:.64rem;font-weight:700;color:var(--t);text-align:center;line-height:1.2}
.rtTypeSection{display:flex;flex-direction:column;gap:12px;padding:14px 0}
.rtTypeHeader{display:flex;align-items:center;gap:12px}
.rtTypeIco{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rtTypeLabel{font-weight:700;font-size:.86rem;letter-spacing:-.01em}
.rtTypeDesc{font-size:.7rem;color:var(--t2);margin-top:2px}
.rtTypeCurrent{display:flex;align-items:center;gap:7px;margin-left:auto;font-size:.73rem;font-weight:600;color:var(--t2)}
.rtTypeDivider{height:1px;background:var(--bd);margin:2px 0}

/* ── Preset picker ── */
.presetGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.presetBtn{
  padding:7px 8px;border-radius:9px;border:1.5px solid var(--bd);
  background:var(--s2);font-size:.71rem;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all var(--dur) var(--ease);text-align:center;line-height:1.3;
  font-family:'Outfit',sans-serif;
}
.presetBtn:hover:not(.disabled){border-color:var(--p);background:var(--pb);color:var(--p)}
.presetBtn.active{background:var(--grad-p);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(91,76,245,.25)}
.presetBtn.active:hover{box-shadow:0 5px 14px rgba(91,76,245,.35)}
.presetBtn.disabled{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.presetTags{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
.presetTag{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:99px;background:var(--pb);border:1.5px solid var(--p);color:var(--p);font-size:.7rem;font-weight:700}
.presetTagX{background:none;border:none;cursor:pointer;color:var(--p);font-size:.78rem;line-height:1;padding:0 0 0 2px;opacity:.65}
.presetTagX:hover{opacity:1}
@media(max-width:640px){.presetGrid{grid-template-columns:repeat(2,1fr)}}

/* ── Toast ── */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{
  background:var(--t);color:var(--bg);padding:10px 20px;
  border-radius:99px;font-size:.83rem;font-weight:600;
  box-shadow:var(--sh-lg);animation:tin .25s var(--ease-spring);white-space:nowrap;
  font-family:'Outfit',sans-serif;letter-spacing:-.01em;
}
@keyframes tin{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:none}}
.toast.ok{background:var(--g)}
.toast.err{background:var(--r)}
.toast.warn{background:var(--y);color:#1a0f00}

/* ── Utils ── */
.flex{display:flex}.col{flex-direction:column}.fw{flex-wrap:wrap}
.ic{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.g1{gap:5px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search{display:flex;align-items:center;gap:7px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--rs);padding:7px 13px}
.search input{background:none;border:none;outline:none;font-size:.83rem;color:var(--t);flex:1;min-width:0;font-family:'Outfit',sans-serif}
.search input::placeholder{color:var(--t4)}
.clickable{cursor:pointer}
.empty{text-align:center;padding:44px 20px}
.emico{font-size:46px;margin-bottom:11px;opacity:.35}
.emtxt{font-size:.93rem;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:-.01em}
.emsub{font-size:.8rem;color:var(--t3)}

/* ── Date & Time input icon visibility ── */
/* Light mode: ensure picker icons use light scheme */
input[type="date"],
input[type="time"],
input[type="datetime-local"] {
  color-scheme: light;
}
/* Dark mode: force picker icons to be visible (white/light) */
[data-theme=dark] input[type="date"],
[data-theme=dark] input[type="time"],
[data-theme=dark] input[type="datetime-local"] {
  color-scheme: dark;
}
/* Explicitly colour the calendar/clock indicator icons */
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator,
input[type="datetime-local"]::-webkit-calendar-picker-indicator {
  cursor: pointer;
  border-radius: 4px;
  padding: 2px;
  opacity: 0.65;
  filter: none;
  transition: opacity 0.15s, filter 0.15s;
}
input[type="date"]::-webkit-calendar-picker-indicator:hover,
input[type="time"]::-webkit-calendar-picker-indicator:hover,
input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
  opacity: 1;
}
/* Dark mode: invert the icons so they appear white/light on dark backgrounds */
[data-theme=dark] input[type="date"]::-webkit-calendar-picker-indicator,
[data-theme=dark] input[type="time"]::-webkit-calendar-picker-indicator,
[data-theme=dark] input[type="datetime-local"]::-webkit-calendar-picker-indicator {
  filter: invert(1) brightness(1.8);
  opacity: 0.9;
}
[data-theme=dark] input[type="date"]::-webkit-calendar-picker-indicator:hover,
[data-theme=dark] input[type="time"]::-webkit-calendar-picker-indicator:hover,
[data-theme=dark] input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
  filter: invert(1) brightness(2.2);
  opacity: 1;
}


/* ════════════════════════════════════════
   GREY THEME
════════════════════════════════════════ */
[data-theme=grey]{
  --bg:#f0f0ef;--s:#fafaf9;--s2:#eeeeed;--s3:#e5e5e3;
  --bd:#d8d8d6;--bd2:#c4c4c2;
  --t:#1a1a18;--t2:#545450;--t3:#8a8a86;--t4:#bbbbb8;
  --pb:#eeecfe;--pb2:#e0ddfd;
  --gb:#d1fae5;--rb:#fee2e2;--yb:#fef3c7;--bb:#dbeafe;
  --sb-bg:#1a1a18;--sb-t:#a0a09c;--sb-t2:#ffffff;
  --sh-sm:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
  --sh-lg:0 12px 32px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.06);
  --sh-xl:0 24px 56px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.08);
}

/* ════════════════════════════════════════
   LAYOUT — slim sidebar (brand only) + bottom nav
   Desktop: sidebar shrinks to just the logo strip.
   Bottom nav always visible at bottom of .main.
════════════════════════════════════════ */
.sidebar{
  width:68px;   /* Just logo strip on desktop */
  overflow:hidden;
}
.sidebar .snav,.sidebar .sfoot,.sidebar .snav-sec,.sidebar .snav-item{display:none}
.main{margin-left:68px}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%);width:var(--sw)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .burger{display:flex!important}
}
/* On desktop sidebar shows only logo */
.slogo{padding:16px 14px;justify-content:center}
.slogo-t,.slogo-s{display:block}
@media(min-width:861px){
  .slogo{flex-direction:column;align-items:center;padding:20px 10px;gap:6px}
  .slogo-t{font-size:.72rem;letter-spacing:.02em;text-align:center;color:var(--sb-t)}
  .slogo-s{display:none}
}

/* ════════════════════════════════════════
   BOTTOM NAV BAR
════════════════════════════════════════ */
.bottom-nav{
  position:sticky;bottom:0;left:0;right:0;
  height:62px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;
  z-index:60;
  padding:0 4px;
  box-shadow:0 -4px 20px rgba(15,13,42,.06);
}
[data-theme=dark] .bottom-nav{background:rgba(15,13,42,.88);border-color:var(--bd)}
[data-theme=grey] .bottom-nav{background:rgba(250,250,249,.88);border-color:var(--bd)}

.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 2px;border:none;background:none;cursor:pointer;
  color:var(--t3);transition:color .15s var(--ease);position:relative;
  font-family:'Outfit',sans-serif;min-width:0;
}
.bn-item:hover{color:var(--p)}
.bn-active{color:var(--p)}
.bn-active .bn-ico{
  background:var(--pb);border-radius:12px;
  transform:scale(1.1);
}
.bn-ico{
  font-size:18px;line-height:1;width:36px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:all .18s var(--ease-spring);
}
.bn-label{font-size:.58rem;font-weight:600;letter-spacing:.02em;line-height:1;white-space:nowrap}
.bn-badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  min-width:16px;height:16px;background:var(--r);color:#fff;
  border-radius:99px;font-size:.55rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  border:2px solid var(--bg);
}

/* Create / + button — special pill style */
.bn-create{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:2px 2px 4px;border:none;background:none;cursor:pointer;min-width:0;position:relative}
.bn-create-ico{
  width:48px;height:48px;border-radius:16px;
  background:var(--grad-p);color:#fff;font-size:26px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(91,76,245,.5),0 0 0 0 rgba(91,76,245,.35);
  animation:btnPulse 2.4s ease-in-out infinite;
  transition:all .2s var(--ease-spring);
  margin-top:-10px;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 4px 16px rgba(91,76,245,.5),0 0 0 0 rgba(91,76,245,.35);}
  50%{box-shadow:0 6px 20px rgba(91,76,245,.65),0 0 0 8px rgba(91,76,245,.0);}
}
.bn-create:hover .bn-create-ico{transform:scale(1.12) rotate(8deg);box-shadow:0 8px 24px rgba(91,76,245,.6)}
.bn-create:active .bn-create-ico{transform:scale(.93)}
.bn-create-lbl{font-size:.6rem;font-weight:700;color:var(--p);letter-spacing:.04em}

/* Push page content up to not be hidden by bottom nav */
.page{padding-bottom:80px}

/* Topbar: remove left padding gap that was for sidebar */
@media(min-width:861px){
  .topbar{padding-left:16px}
}


/* ── Bottom Nav: More popup menu ── */
.bn-more-menu{
  position:absolute;bottom:calc(100% + 10px);right:0;
  background:var(--s);border:1px solid var(--bd);
  border-radius:16px;box-shadow:var(--sh-lg);
  min-width:180px;padding:6px;
  animation:mboxin .18s var(--ease);
}
.bn-more-item{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:11px 14px;border-radius:10px;
  border:none;background:transparent;cursor:pointer;
  font-size:.88rem;font-weight:600;color:var(--t2);
  font-family:'Outfit',sans-serif;
  transition:all .15s var(--ease);text-align:left;
}
.bn-more-item:hover{background:var(--s2);color:var(--t)}
.bn-more-item.active{background:var(--pb);color:var(--p)}


/* ══════════════════════════════════════════════
   MOBILE-FIRST RESPONSIVE — max-width: 640px
   Covers: layout, nav, modals, cards, calendar,
   profile, forms, stat grid, typography
══════════════════════════════════════════════ */
@media(max-width:640px){

  /* ── Layout ── */
  .layout{flex-direction:column}
  .main{margin-left:0!important;padding-bottom:72px}
  .sidebar{display:none!important}
  .page{padding:14px 14px 80px}

  /* ── Topbar ── */
  .topbar{padding:0 14px;height:52px}
  .tbtitle{font-size:.9rem}

  /* ── Typography ── */
  .ptitle{font-size:1.25rem}

  /* ── Stat grid: 2 columns ── */
  .statg{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .statc{padding:14px 12px;gap:10px}
  .stico{width:38px;height:38px;border-radius:11px;font-size:16px}
  .stval{font-size:1.4rem}
  .stlbl{font-size:.6rem}

  /* ── Cards ── */
  .card{padding:16px 14px}
  .ch{margin-bottom:12px}

  /* ── Bottom Nav: tighter on small screens ── */
  .bottom-nav{height:58px;padding:0 2px}
  .bn-item{gap:2px;padding:4px 1px}
  .bn-ico{font-size:16px;width:30px;height:24px;border-radius:8px}
  .bn-label{font-size:.5rem}
  .bn-create{padding:2px 1px 3px}
  .bn-create-ico{width:42px;height:42px;border-radius:13px;font-size:22px;margin-top:-8px}
  .bn-create-lbl{font-size:.5rem}

  /* ── More menu: position above the more button ── */
  .bn-more-menu{right:2px;min-width:150px;border-radius:12px}
  .bn-more-item{padding:9px 12px;font-size:.82rem}

  /* ── Modal: full-screen bottom sheet on mobile ── */
  .msk{padding:0;align-items:flex-end;background:rgba(8,7,26,.5)}
  .modal,.modal-lg,.modal-sm,.modal-xl{
    max-width:100%!important;width:100%!important;
    border-radius:22px 22px 0 0!important;
    margin:0!important;
    max-height:94vh!important;
    overflow:hidden;
  }
  .modal form>div.mb2,.modal form>[style]{overflow-y:auto;max-height:calc(94vh - 140px)!important}
  .mh{padding:14px 16px 12px}
  .mt{font-size:.95rem}
  .mb2{padding:14px 16px!important}
  .mf{padding:12px 16px;gap:8px;border-radius:0!important}
  .mf .btn{flex:1;justify-content:center}

  /* ── Tabs inside modal ── */
  .tabs{gap:1px;padding:2px}
  .tab{padding:6px 10px;font-size:.72rem}

  /* ── Forms ── */
  .fr2{grid-template-columns:1fr!important;gap:0}
  .fg{margin-bottom:12px}
  .fi{font-size:.85rem;padding:10px 12px}
  textarea.fi{min-height:70px}

  /* ── Buttons ── */
  .btn{padding:9px 14px;font-size:.82rem}
  .btn-sm{padding:5px 10px;font-size:.74rem}
  .ph{margin-bottom:16px;gap:8px}
  .ph .btn{font-size:.8rem;padding:8px 13px}

  /* ── Event cards ── */
  .evc{padding:13px 14px}
  .ech{flex-wrap:wrap}
  .emeta{gap:5px}
  .emi{font-size:.68rem}

  /* ── Task items ── */
  .ti{padding:12px 13px;gap:10px}
  .tact{opacity:1!important}  /* always show actions on mobile (no hover) */
  .ttl{font-size:.85rem}
  .tdsc{font-size:.74rem}
  .tmeta{gap:5px}

  /* ── Calendar: scale down monthly grid ── */
  .calg{gap:2px}
  .caldn{font-size:.55rem;padding:5px 2px}
  .calc{min-height:54px;padding:5px 4px;border-radius:8px}
  .caldate{font-size:.68rem;margin-bottom:2px}
  .calev{font-size:.5rem;padding:1px 3px;border-radius:3px}

  /* ── Profile: stack layout ── */
  .flex.g4.fw[style]{flex-direction:column!important;gap:12px!important}
  .card[style*='flex:0 0']{min-width:0!important;width:100%!important}
  .proav{width:60px;height:60px;border-radius:16px;font-size:1.6rem;margin-bottom:8px}

  /* ── Profile theme cards: smaller ── */
  .fg div[style*='repeat(3,1fr)']{gap:6px!important}

  /* ── Reminder popup ── */
  .remc{padding:24px 18px;border-radius:20px}
  .bell{font-size:40px}
  .snopts{grid-template-columns:repeat(2,1fr)!important;gap:6px}

  /* ── Auth screen ── */
  .acard{padding:28px 20px;border-radius:20px;margin:12px}
  .authLogoWrap{width:50px;height:50px;border-radius:14px}
  .atitle{font-size:1.3rem}

  /* ── Preset grid ── */
  .presetGrid{grid-template-columns:repeat(2,1fr)!important}

  /* ── Ringtone picker ── */
  .rtTileGrid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
  .rtGroups{gap:3px}
  .rtGroupTab{padding:4px 9px;font-size:.7rem}

  /* ── Search ── */
  .search{padding:6px 11px}
  .search input{font-size:.8rem}

  /* ── Hour drill-down modal ── */
  .dayHourWrap{max-height:400px}

  /* ── Voice recorder ── */
  .vrec{padding:14px}

  /* ── Empty state ── */
  .empty{padding:28px 12px}
  .emico{font-size:36px}
  .emtxt{font-size:.85rem}

  /* ── Report bars ── */
  .barrow{grid-template-columns:90px 1fr 32px;font-size:.72rem}

  /* ── Subtask editor ── */
  .subEditor-body{padding:12px 12px 14px}
  .subEditor-head{padding:9px 12px}
}

/* ── Extra small (320px) ── */
@media(max-width:360px){
  .bn-label{display:none}  /* hide labels on very small screens, show icons only */
  .bottom-nav{height:52px}
  .bn-create-ico{width:38px;height:38px}
  .statg{grid-template-columns:1fr 1fr}
  .stval{font-size:1.2rem}
}

</style>

/* ─── SECURITY: repeatable pw hash (PBKDF-light, no external deps) ─── */
function hashPwSync(pw){
  /* 5-round base64 chain — not cryptographically ideal but far better than
     raw btoa and works entirely in-browser with zero external deps */
  var h=pw;
  for(var i=0;i<5;i++){
    try{h=btoa(unescape(encodeURIComponent(h+'|beep|'+pw)));}
    catch(e){h=btoa(h+'|beep|'+pw);}
  }
  return h;
}

/*
  playAlarm(type, ringtoneId):
   - 'Silent'              -> no sound, but STILL vibrates (so a silenced phone still alerts physically)
   - 'Push Notification'-> 2s ringtone (playPushNotifSound) + OS push notification banner
   - 'Short Alarm'         -> rings repeatedly for a fixed 10 seconds, then auto-stops and waits for Acknowledge
   - 'Continuous Alarm'    -> rings repeatedly for a fixed 50 seconds (or until Acknowledge, whichever is first)
   Both alarm modes also vibrate the device for the same duration as a silent-mode fallback.
*/
function playAlarm(type,ringtoneId){
  stopAlarm();
  if(!type||type==='Push Notification')return;
  if(type==='Silent'){
  /* Silent: vibrate with a more noticeable pattern — no sound at all */
  stopVibration();
  if('vibrate'in navigator){
    navigator.vibrate(VIBE_SILENT);
    vibrateLoopTimer=setInterval(function(){
      navigator.vibrate(VIBE_SILENT);

  }

  var ctx=getAudioCtx();if(!ctx)return;
  /* Use per-type default when no explicit ringtone id provided */
  var fallback=type==='Continuous Alarm'?getDefaultRingtoneFor('long'):getDefaultRingtoneFor('short');
  var rt=findRingtone(ringtoneId||fallback);
  var durationMs=type==='Continuous Alarm'?CONTINUOUS_ALARM_DURATION_MS:SHORT_ALARM_DURATION_MS;

}

  if(alarmStopTimer){clearTimeout(alarmStopTimer);alarmStopTimer=null;}
  stopVibration();
}

function sendNotif(t,b,ringtoneType){

/* ─── SECURITY: rate limiting / brute-force protection for login ─── */
var _loginAttempts=0;var _lockUntil=0;
function checkRateLimit(){
  if(Date.now()<_lockUntil){
    var secs=Math.ceil((_lockUntil-Date.now())/1000);
    return 'Too many failed attempts. Try again in '+secs+' seconds.';
  }
  return null;
}
function recordFailedLogin(){
  _loginAttempts++;
  if(_loginAttempts>=5){
    /* Exponential backoff: 30s, 2min, 10min */
    var delay=_loginAttempts>=8?600000:_loginAttempts>=6?120000:30000;
    _lockUntil=Date.now()+delay;
  }
}
function resetLoginAttempts(){_loginAttempts=0;_lockUntil=0;}
/* ─── MICROPHONE PERMISSION ─── */
/* Centralized mic-permission helper used by the voice recorder AND a Profile settings check.
   Returns a Promise<'granted'|'denied'|'unsupported'> and also caches state for the UI. */
var micPermState=S.get('micPermState','unknown'); // 'unknown'|'granted'|'denied'|'unsupported'
function getMicPermission(){
  return new Promise(function(resolve){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      micPermState='unsupported';S.set('micPermState',micPermState);resolve('unsupported');return;
    }
    // Prefer the Permissions API to check WITHOUT prompting, when available
    if(navigator.permissions&&navigator.permissions.query){
      navigator.permissions.query({name:'microphone'}).then(function(res){
        micPermState=res.state==='granted'?'granted':res.state==='denied'?'denied':'unknown';
        S.set('micPermState',micPermState);
        resolve(micPermState);
      }).catch(function(){resolve('unknown');});
    } else {
      resolve('unknown');
    }
  });
}
/* Actually requests mic access (will show the native browser prompt the first time). */
function requestMicAccess(){
  return navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    micPermState='granted';S.set('micPermState',micPermState);
    return stream;
  }).catch(function(err){
    micPermState='denied';S.set('micPermState',micPermState);
    throw err;
  });
}

/* ════════════════════════════════════════
   EMAIL OTP AUTHENTICATION SYSTEM
   - Email-only login (no passwords stored)
   - 6-digit OTP expires after 2 minutes
   - Magic link option shown alongside OTP
   - New users auto-created on first verify
   - Existing users recognised by email
   - Stay logged in until explicit logout
   Zero external dependencies — OTP/link
   shown in-app (simulates email delivery;
   in production wire to any free SMTP/
   transactional email service).
════════════════════════════════════════ */

/* OTP store: { email, code, magic, expiresAt } — in memory only */
var _otpStore = null;

function generateOTP() {
  return String(Math.floor(100000 + Math.random() * 900000));
}
function generateMagicToken() {
  var arr = new Uint8Array(24);
  try { crypto.getRandomValues(arr); } catch(e) {
    for(var i=0;i<24;i++) arr[i]=Math.floor(Math.random()*256);
  }
  return Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

/* "Send" OTP — in production replace this with a real email API call.
   Here we surface the code in the UI so the app is fully functional
   without any paid email service. */
function sendOTPEmail(email, code, magicToken) {
  _otpStore = {
    email: email.toLowerCase().trim(),
    code: code,
    magic: magicToken,
    expiresAt: Date.now() + 2 * 60 * 1000   /* 2 minutes */
  };
  console.log('[Beep Auth] OTP for ' + email + ': ' + code + ' | Magic token: ' + magicToken);
}

function verifyOTP(email, code) {
  if (!_otpStore) return 'no_otp';
  if (_otpStore.email !== email.toLowerCase().trim()) return 'wrong_email';
  if (Date.now() > _otpStore.expiresAt) return 'expired';
  if (_otpStore.code !== code.trim()) return 'wrong_code';
  return 'ok';
}
function verifyMagicToken(token) {
  if (!_otpStore) return null;
  if (Date.now() > _otpStore.expiresAt) return null;
  if (_otpStore.magic !== token) return null;
  return _otpStore.email;
}
function clearOTP() { _otpStore = null; }

/* Find or create user by email (no passwords — identity proven by OTP) */
function resolveUser(email) {
  var users = S.get('users', []);
  var found = null;
  for (var i = 0; i < users.length; i++) {
    if (users[i].email === email.toLowerCase().trim()) { found = users[i]; break; }
  }
  if (!found) {
    found = { id: uid(), email: email.toLowerCase().trim(), name: email.split('@')[0] };
    S.set('users', users.concat([found]));
  }
  return found;
}

/* ─── PHASE 2: OTP + Magic Link verification screen ─── */
function OTPStep(props) {
  /* props: email, magicToken, onSuccess */
  var SC = useState(''); var code = SC[0], setCode = SC[1];
  var ER = useState(''); var err = ER[0], setErr = ER[1];
  var EX = useState(false); var expired = EX[0], setExpired = EX[1];
  var CD = useState(120); var countdown = CD[0], setCountdown = CD[1];
  var RS = useState(false); var resending = RS[0], setResending = RS[1];
  var SH = useState(false); var showLink = SH[0], setShowLink = SH[1];
  var LD = useState(false); var loading = LD[0], setLoading = LD[1];

  /* Countdown timer */
  useEffect(function() {
    var t = setInterval(function() {
      setCountdown(function(c) {
        if (c <= 1) { clearInterval(t); setExpired(true); return 0; }
        return c - 1;
      });
    }, 1000);
    return function() { clearInterval(t); };
  }, []);

  function fmt(s) { return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

  function verify(e) {
    e.preventDefault(); setErr(''); setLoading(true);
    setTimeout(function() {
      setLoading(false);
      var result = verifyOTP(props.email, code);
      if (result === 'ok') {
        clearOTP();
        var u = resolveUser(props.email);
        setStorageUser(u.id);
        props.onSuccess(u);
      } else if (result === 'expired') {
        setExpired(true); setErr('Code expired. Request a new one below.');
      } else if (result === 'wrong_code') {
        setErr('Incorrect code. Please check your inbox and try again.');
      } else {
        setErr('Verification failed. Please try again.');
      }
    }, 300);
  }

  function useMagicLink() {
    var email = verifyMagicToken(props.magicToken);
    if (!email) { setErr('Magic link has expired. Please request a new code.'); setExpired(true); return; }
    clearOTP();
    var u = resolveUser(email);
    setStorageUser(u.id);
    props.onSuccess(u);
  }

  function resend() {
    setResending(true);
    var newCode = generateOTP();
    var newToken = generateMagicToken();
    sendOTPEmail(props.email, newCode, newToken);
    props.onResend(newToken);
    setCode(''); setErr(''); setExpired(false); setCountdown(120); setResending(false);
    toast('New verification code sent!', 'ok');
  }

  return h('div', { className: 'authwrap' },
    h('div', { className: 'acard' },
      h('div', { style: { textAlign: 'center', marginBottom: 20 } },
        h('div', { className: 'authLogoWrap' }, h(Logo, { size: 34 })),

        h('p', { className: 'asub' }, 'We sent a 6-digit code to'),
        h('p', { style: { fontWeight: 700, color: 'var(--p)', marginBottom: 4 } }, props.email),
        !expired
          ? h('p', { style: { fontSize: '.78rem', color: 'var(--t2)' } }, 'Expires in ', h('strong', null, fmt(countdown)))
          : h('p', { style: { fontSize: '.78rem', color: 'var(--r)', fontWeight: 700 } }, '⏱ Code expired')
      ),

      /* OTP entry */
      !expired && h('form', { onSubmit: verify },
        h('div', { className: 'fg' },
          h('label', { className: 'fl' }, 'Verification Code'),
          h('input', {
            className: 'fi', type: 'text', inputMode: 'numeric', pattern: '[0-9]{6}',
            maxLength: 6, placeholder: '123456',
            value: code, onChange: function(e) { setCode(e.target.value.replace(/\D/g,'').slice(0,6)); },
            autoFocus: true, style: { fontSize: '1.5rem', letterSpacing: '0.2em', textAlign: 'center' }
          })
        ),
        err && h('p', { className: 'ferr mb3' }, err),
        h('button', { type: 'submit', className: 'btn bp w100 mb3', disabled: loading || code.length < 6 },
          loading ? '⏳ Verifying…' : '✅ Verify Code'
        )
      ),
      expired && err && h('p', { className: 'ferr mb3' }, err),

      /* Magic link section */
      !expired && h('div', null,
        h('div', { className: 'divider' }, 'or'),
        h('button', {
          type: 'button', className: 'btn bo w100 mb3',
          onClick: function() { setShowLink(!showLink); }
        }, showLink ? '🔒 Hide Magic Link' : '🔗 Use Magic Link Instead'),
        showLink && h('div', {
          className: 'otpDevBox',
          style: { background: 'var(--pb)', border: '1.5px solid var(--p)', borderRadius: 12, padding: '14px 16px', marginBottom: 12 }
        },
          h('p', { style: { fontSize: '.72rem', fontWeight: 700, color: 'var(--p)', marginBottom: 8 } },
            '🔗 Magic Sign-in Link'
          ),
          h('p', { style: { fontSize: '.7rem', color: 'var(--t2)', marginBottom: 10 } },
            'In production this link is emailed. Click it to sign in instantly:'
          ),
          h('button', {
            type: 'button', className: 'btn bp w100',
            style: { wordBreak: 'break-all', fontSize: '.75rem' },
            onClick: useMagicLink
          }, '✨ Click to sign in with magic link → ' + props.email)
        )
      ),

      /* OTP dev helper — shows code in UI since we have no real email server */
      h('div', {
        className: 'otpDevBox',
        style: { marginTop: 8, background: 'var(--yb)', border: '1.5px solid var(--y)', borderRadius: 12, padding: '12px 14px' }
      },
        h('p', { style: { fontSize: '.7rem', fontWeight: 700, color: '#a06000', marginBottom: 4 } },
          '📬 Your verification code (shown here — in production this arrives by email):'
        ),
        h('p', { style: { fontSize: '2rem', fontWeight: 900, color: 'var(--t)', letterSpacing: '0.3em', textAlign: 'center', margin: '8px 0' } },

      /* Resend / back */

/* ─── ROOT AUTH WRAPPER ─── */
function AuthPage() {
  var ctx = useContext(Ctx);
  var SP = useState('email'); var phase = SP[0], setPhase = SP[1]; /* 'email' | 'otp' */
  var SE = useState(''); var pendingEmail = SE[0], setPendingEmail = SE[1];
  var ST = useState(''); var magicToken = ST[0], setMagicToken = ST[1];

  /* Check for magic link token in URL hash on mount */
  useEffect(function() {
    var hash = window.location.hash;
    var m = hash.match(/[#&]beep_magic=([a-f0-9]{48})/);
    if (m) {
      var token = m[1];
      var email = verifyMagicToken(token);
      if (email) {
        clearOTP();
        var u = resolveUser(email);
        setStorageUser(u.id);
        ctx.setUser(u); S.set('user', u);
        window.location.hash = '';
      }
    }
  }, []);

  function handleSent(email, token) {
    setPendingEmail(email);
    setMagicToken(token);
    setPhase('otp');
  }
  function handleSuccess(u) {
    ctx.setUser(u); S.set('user', u);
    toast('Welcome, ' + (u.name || u.email) + '! 🎉', 'ok');
  }
  function handleResend(newToken) { setMagicToken(newToken); }

  if (phase === 'otp') {
    return h(OTPStep, {
      email: pendingEmail,
      magicToken: magicToken,
      onSuccess: handleSuccess,
      onResend: handleResend,
      onBack: function() { setPhase('email'); }
    });
  }
  return h(EmailStep, { onSent: handleSent });
}

function PresetPicker(props){
  var base=props.baseDate&&props.baseTime
    ?new Date(props.baseDate+'T'+props.baseTime)
    :props.baseDate
      ?new Date(props.baseDate+'T09:00:00')

  var now=new Date();
  var selected=props.selected||[];

  function toggle(iso){
    if(!iso)return;
    var idx=selected.indexOf(iso);

    h('div',{className:'presetGrid',style:{gridTemplateColumns:'repeat('+cols+',1fr)'}},

function VoiceRecorder(props){
  var SR=useState(false);var recording=SR[0],setRecording=SR[1];
  var SE=useState(0);var elapsed=SE[0],setElapsed=SE[1];
  var SPE=useState(micPermState);var permState=SPE[0],setPermState=SPE[1]; // 'unknown'|'granted'|'denied'|'unsupported'
  var SERR=useState('');var micErr=SERR[0],setMicErr=SERR[1];
  var mrRef=useRef(null);var chunksRef=useRef([]);var timerRef=useRef(null);

  useEffect(function(){getMicPermission().then(setPermState);},[]);

  function startRec(){
    setMicErr('');
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setPermState('unsupported');toast('Voice recording is not supported in this browser','err');return;
    }
    requestMicAccess().then(function(stream){
      setPermState('granted');
      var mimeType='audio/webm';
      if(window.MediaRecorder&&MediaRecorder.isTypeSupported){
        if(MediaRecorder.isTypeSupported('audio/webm')){mimeType='audio/webm';}
        else if(MediaRecorder.isTypeSupported('audio/mp4')){mimeType='audio/mp4';}
        else{mimeType='';}
      }
      var mr=mimeType?new MediaRecorder(stream,{mimeType:mimeType}):new MediaRecorder(stream);
      mrRef.current=mr;chunksRef.current=[];
      mr.ondataavailable=function(e){if(e.data&&e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=function(){
        var blob=new Blob(chunksRef.current,{type:mr.mimeType||'audio/webm'});
        var reader=new FileReader();
        reader.onload=function(e){props.onChange(e.target.result);};
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(function(t){t.stop();});
      };
      mr.start();setRecording(true);setElapsed(0);
      timerRef.current=setInterval(function(){setElapsed(function(x){return x+1;});},1000);
    }).catch(function(err){
      setPermState('denied');
      var name=err&&err.name;
      if(name==='NotAllowedError'||name==='PermissionDeniedError'){
        setMicErr('Microphone access was blocked. Enable it in your browser/site settings, then try again.');
        toast('Microphone permission denied','err');
      } else if(name==='NotFoundError'||name==='DevicesNotFoundError'){
        setMicErr('No microphone was found on this device.');
        toast('No microphone detected','err');
      } else if(name==='NotReadableError'){
        setMicErr('Your microphone is busy or unavailable (another app may be using it).');
        toast('Microphone unavailable','err');
      } else {
        setMicErr('Could not access the microphone.');
        toast('Microphone access failed','err');
      }
    });
  }
  function stopRec(){if(mrRef.current&&mrRef.current.state==='recording'){mrRef.current.stop();}setRecording(false);clearInterval(timerRef.current);}

  var permBadge=
    permState==='granted'?h('span',{className:'b b-g',style:{marginLeft:6}},'🎙️ Mic allowed'):
    permState==='denied'?h('span',{className:'b b-hi',style:{marginLeft:6}},'🚫 Mic blocked'):
    permState==='unsupported'?h('span',{className:'b b-gr',style:{marginLeft:6}},'Not supported'):null;

  return h('div',null,
    h('div',{className:'vrec'+(recording?' rec':'')},
      h('div',{className:'flex ic',style:{justifyContent:'center',marginBottom:6}},
        h('span',{style:{fontSize:'.82rem',fontWeight:600,color:'var(--t2)'}},recording?'🔴 Recording... '+fmt2(elapsed):'🎤 Voice Note'),
        permBadge
      ),
      recording&&h('div',{className:'waves'},[1,2,3,4,5,6,7].map(function(i){return h('div',{key:i,className:'wv'});})),
      !recording&&!props.value&&permState!=='denied'&&permState!=='unsupported'&&h('p',{style:{fontSize:'.77rem',color:'var(--t3)',margin:'10px 0'}},'Tap Start Recording — your browser will ask to allow microphone access the first time.'),
      micErr&&h('p',{style:{fontSize:'.76rem',color:'var(--r)',margin:'10px 0',padding:'8px 10px',background:'var(--rb)',borderRadius:7}},'⚠️ '+micErr),
      h('div',{className:'flex g2 jc mt2'},
        !recording&&!props.value&&h('button',{type:'button',className:'btn bp',onClick:startRec},'🎙️ Start Recording'),
        recording&&h('button',{type:'button',className:'btn be',onClick:stopRec},'⏹ Stop'),
        props.value&&!recording&&h('button',{type:'button',className:'btn bs',onClick:startRec},'🔄 Replace'),
        props.value&&!recording&&h('button',{type:'button',className:'btn be',onClick:function(){props.onChange(null);}},'🗑️ Delete')
      )
    ),
    props.value&&!recording&&h('div',{className:'mt2'},h(VoicePlayer,{src:props.value}))
  );
}
function VoicePlayer(props){

/* ════════════════════════════════════════
   REMINDER POPUP  — drills Event → Task → Subtask
════════════════════════════════════════ */
function ReminderPopup(){
  var ctx=useContext(Ctx);
  var PH=useState('ring');var phase=PH[0],setPhase=PH[1];
  var SM=useState(false);var snMode=SM[0],setSnMode=SM[1];
  var CM=useState('15');var custMin=CM[0],setCustMin=CM[1];

  var payload=ctx.activeRem; // {kind:'event'|'task'|'subtask', event, task, subtask}

  /* Resolve the live objects from store (may have changed since reminder was scheduled) */
  var liveEvent=payload.kind==='event'
    ?(findById(ctx.events,payload.event.id)||payload.event)
    :(payload.task&&payload.task.eventId?findById(ctx.events,payload.task.eventId):null);
  var liveTask=payload.kind!=='event'?(findById(ctx.tasks,payload.task.id)||payload.task):null;
  var liveSubtask=null;
  if(payload.kind==='subtask'&&liveTask){
    for(var i=0;i<(liveTask.subtasks||[]).length;i++){if(liveTask.subtasks[i].id===payload.subtask.id){liveSubtask=liveTask.subtasks[i];break;}}
    if(!liveSubtask)liveSubtask=payload.subtask;
  }

  /* The "target" is whichever level fired the reminder */
  var target=payload.kind==='event'?liveEvent:payload.kind==='subtask'?liveSubtask:liveTask;
  var voiceNote=target.voiceNote;
  var remType=target.remType;
  var remTime=target.remTime;
  var ringtoneId=target.ringtone||getDefaultRingtone();
  var title=target.title;
  var description=target.description;
  var priority=payload.kind==='event'?null:target.priority; /* events have no priority */
  var status=payload.kind==='event'?null:target.status;

  var ringDurationSec=remType==='Continuous Alarm'?CONTINUOUS_ALARM_DURATION_MS/1000:remType==='Silent'?SHORT_ALARM_DURATION_MS/1000:SHORT_ALARM_DURATION_MS/1000;
  var CD=useState(ringDurationSec);var countdown=CD[0],setCountdown=CD[1];

  useEffect(function(){
    if(phase!=='ring')return;
    setCountdown(ringDurationSec);
    var tick=setInterval(function(){
      setCountdown(function(c){
        if(c<=1){
          clearInterval(tick);
          /* Ring duration elapsed on its own (matches the audio/vibration auto-stop) — move to options so the user isn't stuck on a silent screen */
          setPhase(function(p){return p==='ring'?(voiceNote?'voice':'opts'):p;});
          return 0;
        }
        return c-1;
      });
    },1000);
    return function(){clearInterval(tick);};
  },[phase]);

  function ack(){stopAlarm();if(voiceNote){setPhase('voice');}else{setPhase('opts');}}

  function applyStatus(newStatus){
    if(payload.kind==='subtask'){
      ctx.setTasks(function(ts){return ts.map(function(t){if(t.id!==liveTask.id)return t;return Object.assign({},t,{subtasks:t.subtasks.map(function(s){return s.id===liveSubtask.id?Object.assign({},s,{status:newStatus}):s;})});});});
    } else if(payload.kind==='task'){
      ctx.setTasks(function(ts){return ts.map(function(t){return t.id===liveTask.id?Object.assign({},t,{status:newStatus}):t;});});
    }
    /* Events have no status field — dismiss handled separately */
  }
  function applyRemTime(newTime){
    if(payload.kind==='event'){
      ctx.setEvents(function(es){return es.map(function(e){return e.id===liveEvent.id?Object.assign({},e,{remTime:newTime}):e;});});
    } else if(payload.kind==='subtask'){
      ctx.setTasks(function(ts){return ts.map(function(t){if(t.id!==liveTask.id)return t;return Object.assign({},t,{subtasks:t.subtasks.map(function(s){return s.id===liveSubtask.id?Object.assign({},s,{remTime:newTime}):s;})});});});
    } else {
      ctx.setTasks(function(ts){return ts.map(function(t){return t.id===liveTask.id?Object.assign({},t,{remTime:newTime}):t;});});
    }
  }

    if(payload.kind!=='event')applyStatus('Completed');

/* ════════════════════════════════════════
   DAY HOUR VIEW — Teams/Outlook-style hour-level drill-down.
   Opens when a date is clicked anywhere in the calendar.
   Shows a scrollable 24-hour timeline with events & timed tasks
   positioned by their hour, a live "now" indicator line (if today),
   an unscheduled-items bar at top, and click-to-create on empty slots.
════════════════════════════════════════ */
function DayHourModal(props){
  var ctx=useContext(Ctx);
  var date=props.date;
  var ds=toLocalDate(date);
  var isT=ds===today();

  var SEV=useState(null);var editEv=SEV[0],setEditEv=SEV[1];
  var SET=useState(null);var editT=SET[0],setEditT=SET[1]; /* an EXISTING task object being edited */
  var SNT=useState(null);var newTaskPrefill=SNT[0],setNewTaskPrefill=SNT[1]; /* {dueDate,dueTime} prefill for a brand-new task */

  var dayEvts=ctx.events.filter(function(ev){return ev.date===ds;});
  var dayTasks=ctx.tasks.filter(function(t){return t.dueDate===ds;});

  var timedEvts=dayEvts.filter(function(ev){return ev.time;});
  var allDayEvts=dayEvts.filter(function(ev){return !ev.time;});
  var timedTasks=dayTasks.filter(function(t){return t.dueTime;});
  var untimedTasks=dayTasks.filter(function(t){return !t.dueTime;});

  function hourOf(timeStr){var p=timeStr.split(':');return parseInt(p[0],10)+ (parseInt(p[1],10)||0)/60;}

  var now=new Date();
  var nowHour=now.getHours()+now.getMinutes()/60;
  var rowH=56;

  function handleEvSave(ev){ctx.setEvents(function(es){return es.map(function(x){return x.id===ev.id?ev:x;});});toast('Event updated ✓','ok');setEditEv(null);}
  function handleTaskSave(t){
    if(editT){ctx.setTasks(function(ts){return ts.map(function(x){return x.id===t.id?t:x;});});toast('Task updated ✓','ok');setEditT(null);}
    else{ctx.setTasks(function(ts){return ts.concat([t]);});toast('Task created ✓','ok');setNewTaskPrefill(null);}
  }

  function quickCreateAt(hour){
    var hh=String(Math.floor(hour)).padStart(2,'0');
    setNewTaskPrefill({dueDate:ds,dueTime:hh+':00'});
  }

  var HOURS=Array.from({length:24},function(_,i){return i;});

  return h('div',{className:'msk',onClick:function(e){if(e.target===e.currentTarget)props.onClose();}},
    h('div',{className:'modal modal-xl'},
      h('div',{className:'mh'},
        h('div',null,
          h('h2',{className:'mt'},date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})),
          isT&&h('span',{className:'b b-p',style:{marginTop:4,display:'inline-block'}},'Today')
        ),
        h('div',{className:'flex g2'},
          h('button',{className:'btn bp btn-sm',onClick:function(){quickCreateAt(now.getHours());}},'+ Add Task'),
          h('button',{className:'btn bgh',style:{padding:'5px 8px'},onClick:props.onClose},'✕')
        )
      ),
      h('div',{className:'mb2'},
        (allDayEvts.length>0||untimedTasks.length>0)&&h('div',{className:'unscheduledBar'},
          allDayEvts.map(function(ev){
            var cat=findById(ctx.allCats,ev.category);
            return h('div',{key:ev.id,className:'unschedChip',style:{borderColor:cat?cat.color:'var(--bd)',color:cat?cat.color:'var(--t)'},onClick:function(){setEditEv(ev);}},(cat?cat.icon:'📅')+' '+ev.title);
          }),
          untimedTasks.map(function(t){
            return h('div',{key:t.id,className:'unschedChip',onClick:function(){setEditT(t);}},
              (t.status==='Completed'?'✓ ':t.status==='In Progress'?'◑ ':'○ ')+t.title
            );
          })
        ),
        h('div',{className:'dayHourWrap'},
          h('div',{className:'hourGrid',style:{position:'relative'}},
            HOURS.map(function(hh){
              return h('div',{key:'lbl'+hh,className:'hourLabel',style:{gridColumn:1,gridRow:hh+1}},
                hh===0?'12 AM':hh<12?hh+' AM':hh===12?'12 PM':(hh-12)+' PM'
              );
            }),
            HOURS.map(function(hh){
              return h('div',{key:'row'+hh,className:'hourRow',style:{gridColumn:2,gridRow:hh+1},onClick:function(){quickCreateAt(hh);}});
            }),
            isT&&nowHour>=0&&nowHour<24&&h('div',{className:'nowLine',style:{top:(nowHour*rowH)+'px',gridColumn:'2',marginLeft:'56px'}}),
            timedEvts.map(function(ev){
              var cat=findById(ctx.allCats,ev.category);
              var hr=hourOf(ev.time);
              return h('div',{key:'ev'+ev.id,className:'hourBlock',style:{top:(hr*rowH+2)+'px',height:(rowH-4)+'px',left:60,right:8,background:'#3da9fc18',color:'#2390e0',borderLeftColor:'#3da9fc'},onClick:function(e){e.stopPropagation();setEditEv(ev);}},
                h('div',null,(cat?cat.icon:'📅')+' '+ev.title),
                h('div',{className:'hbTime'},ev.time)
              );
            }),
            timedTasks.map(function(t){
              var hr=hourOf(t.dueTime);
              var pc=t.priority==='High'?'var(--r)':t.priority==='Low'?'var(--g)':'var(--y)';
              return h('div',{key:'tk'+t.id,className:'hourBlock',style:{top:(hr*rowH+2)+'px',height:(rowH-4)+'px',left:60,right:8,background:'#e6fbf3',color:'#0a7a57',borderLeftColor:'#0ec98b',opacity:t.status==='Completed'?.55:1},onClick:function(e){e.stopPropagation();setEditT(t);}},
                h('div',null,(t.status==='Completed'?'✓ ':t.status==='In Progress'?'◑ ':'○ ')+t.title),
                h('div',{className:'hbTime'},t.dueTime)
              );
            })
          )
        ),
        h('p',{style:{fontSize:'.74rem',color:'var(--t3)',marginTop:10,textAlign:'center'}},'Tap any empty hour slot to quickly add a task at that time')
      )
    ),
    editEv&&h(EventModal,{ev:editEv,onClose:function(){setEditEv(null);},onSave:handleEvSave}),
    editT&&h(TaskModal,{task:editT,onClose:function(){setEditT(null);},onSave:handleTaskSave}),
    newTaskPrefill&&h(TaskModal,{task:null,prefill:newTaskPrefill,onClose:function(){setNewTaskPrefill(null);},onSave:handleTaskSave})
  );
}


/* ════════════════════════════════════════
   REPORTS — now with Create / Download / Share
════════════════════════════════════════ */
function ReportsPage(){
  var ctx=useContext(Ctx);
  var SHM=useState(false);var showShare=SHM[0],setShowShare=SHM[1];
  var SCM=useState(false);var showCreate=SCM[0],setShowCreate=SCM[1];

  var tot=ctx.tasks.length;
  var comp=ctx.tasks.filter(function(t){return t.status==='Completed';}).length;
  var pend=ctx.tasks.filter(function(t){return t.status==='Pending';}).length;
  var inP=ctx.tasks.filter(function(t){return t.status==='In Progress';}).length;
  var over=ctx.tasks.filter(function(t){return t.status!=='Completed'&&t.dueDate&&isPast(t.dueDate+'T'+(t.dueTime||'23:59'));}).length;
  var upE=ctx.events.filter(function(ev){return !isPast(ev.date+'T23:59');}).length;
  function pct(n){return tot?Math.round(n/tot*100):0;}
  var priC={High:'var(--r)',Medium:'var(--y)',Low:'var(--g)'};
  var catStats=CATS.map(function(c){return Object.assign({},c,{n:ctx.events.filter(function(ev){return ev.category===c.id;}).length});}).filter(function(c){return c.n>0;});

  function buildReportText(){
    var lines=[];
    lines.push('BEEP — REPORT');
    lines.push('Generated: '+new Date().toLocaleString());
    lines.push('User: '+ctx.user.name+' ('+ctx.user.email+')');
    lines.push('');
    lines.push('SUMMARY');
    lines.push('Total Tasks: '+tot);
    lines.push('  Completed: '+comp+' ('+pct(comp)+'%)');
    lines.push('  In Progress: '+inP);
    lines.push('  Pending: '+pend);
    lines.push('  Overdue: '+over);
    lines.push('Total Events: '+ctx.events.length+' (Upcoming: '+upE+')');
    lines.push('');
    lines.push('EVENTS');
    ctx.events.forEach(function(ev){
      var cat=findById(ctx.allCats,ev.category);
      lines.push('- '+ev.title+' ['+(cat?cat.label:ev.category)+'] '+fmtDate(ev.date)+(ev.time?' '+ev.time:'')+(ev.location?' @ '+ev.location:''));
    });
    lines.push('');
    lines.push('TASKS');
    ctx.tasks.forEach(function(t){
      var ev=t.eventId?findById(ctx.events,t.eventId):null;
      lines.push('- ['+t.status+'] '+t.title+' (Priority: '+t.priority+')'+(t.dueDate?' Due: '+fmtDate(t.dueDate)+(t.dueTime?' '+t.dueTime:''):'')+(ev?' — Event: '+ev.title:''));
      (t.subtasks||[]).forEach(function(s){
        lines.push('    · ['+s.status+'] '+(s.title||'(untitled)')+' (Priority: '+s.priority+')'+(s.dueDate?' Due: '+fmtDate(s.dueDate):''));
      });
    });
    return lines.join('\n');
  }
  function buildCsv(){
    var rows=[['Type','Title','Status','Priority','Due Date','Due Time','Event','Notes']];
    ctx.tasks.forEach(function(t){
      var ev=t.eventId?findById(ctx.events,t.eventId):null;
      rows.push(['Task',t.title,t.status,t.priority,t.dueDate||'',t.dueTime||'',ev?ev.title:'',t.notes||'']);
      (t.subtasks||[]).forEach(function(s){
        rows.push(['Subtask',s.title,s.status,s.priority,s.dueDate||'',s.dueTime||'',t.title,s.notes||'']);
      });
    });
    return rows.map(function(r){return r.map(escCsv).join(',');}).join('\n');
  }
  function downloadTxt(){downloadFile('smart-reminder-report-'+today()+'.txt',buildReportText(),'text/plain');toast('Report downloaded ✓','ok');}
  function downloadCsv(){downloadFile('smart-reminder-tasks-'+today()+'.csv',buildCsv(),'text/csv');toast('CSV downloaded ✓','ok');}
  function shareReport(){
    var text=buildReportText();
    if(navigator.share){
      navigator.share({title:'Beep Report',text:text}).then(function(){toast('Shared ✓','ok');}).catch(function(){});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(function(){toast('Report copied to clipboard 📋','ok');}).catch(function(){toast('Could not copy','err');});
    } else {
      toast('Sharing not supported on this browser','err');
    }
    setShowShare(false);
  }
  function shareEmail(){
    var subject=encodeURIComponent('Beep Report — '+today());
    var body=encodeURIComponent(buildReportText());
    window.open('mailto:?subject='+subject+'&body='+body,'_blank');
    setShowShare(false);
  }

  return h('div',null,
    h('div',{className:'ph'},
      h('div',null,h('h1',{className:'ptitle'},'Reports'),h('p',{className:'psub'},tot+' tasks · '+ctx.events.length+' events')),
      h('div',{className:'flex g2'},
        h('button',{className:'btn bs btn-sm',onClick:function(){setShowCreate(true);}},'➕ Create'),
        h('button',{className:'btn bs btn-sm',onClick:downloadTxt},'⬇️ Download'),
        h('button',{className:'btn bp btn-sm',onClick:function(){setShowShare(true);}},'📤 Share')

  function del(id){ctx.setCustomCats(function(cs){return cs.filter(function(c){return c.id!==id;});});toast('Category removed','err');}
  return h('div',{className:'msk',onClick:function(e){if(e.target===e.currentTarget)props.onClose();}},
    h('div',{className:'modal'},
      h('div',{className:'mh'},h('h2',{className:'mt'},'🏷 Manage Categories'),h('button',{className:'btn bgh',style:{padding:'5px 8px'},onClick:props.onClose},'✕')),
      h('div',{className:'mb2'},
        h('p',{style:{fontSize:'.85rem',color:'var(--t2)',marginBottom:12}},'Built-in categories cannot be edited. Add custom categories below.'),
        h('div',{className:'flex fw g2 mb4'},CATS.map(function(c){return h('span',{key:c.id,className:'b',style:{background:c.color+'22',color:c.color}},c.icon+' '+c.label);})),
        ctx.customCats.length>0&&h('div',{className:'mb4'},h('h4',{style:{fontWeight:700,marginBottom:8,fontSize:'.875rem'}},'Custom Categories'),
          h('div',{className:'flex col g2'},ctx.customCats.map(function(c){return h('div',{key:c.id,className:'flex ic g2',style:{padding:'8px 12px',background:'var(--s2)',borderRadius:8}},h('span',{style:{fontSize:18}},c.icon),h('span',{style:{fontWeight:600,flex:1,color:c.color}},c.label),h('button',{className:'btn bgh',style:{padding:'4px 7px'},onClick:function(){setLbl(c.label);setColor(c.color);setIcon(c.icon);setEditId(c.id);}},'✏️'),h('button',{className:'btn bgh',style:{padding:'4px 7px'},onClick:function(){del(c.id);}},'🗑️'));}))
        ),
        h('div',{style:{background:'var(--s2)',padding:16,borderRadius:12}},
          h('h4',{style:{fontWeight:700,marginBottom:12,fontSize:'.875rem'}},editId?'Edit Category':'Add Custom Category'),
          h('div',{className:'fg'},h('label',{className:'fl'},'Name'),h('input',{className:'fi',placeholder:'Category name',value:lbl,onChange:function(e){setLbl(e.target.value);}})),
          h('div',{className:'fg'},h('label',{className:'fl'},'Color'),h('div',{className:'swatches'},COLORS.map(function(c){return h('div',{key:c,className:'sw'+(color===c?' on':''),style:{background:c},onClick:function(){setColor(c);}});}))),
          h('div',{className:'fg'},h('label',{className:'fl'},'Icon'),h('div',{className:'icog'},ICONS.map(function(i){return h('div',{key:i,className:'icoo'+(icon===i?' on':''),onClick:function(){setIcon(i);}},i);}))),
          h('div',{className:'flex g2'},h('button',{className:'btn bp',onClick:save},editId?'Update':'Add Category'),editId&&h('button',{className:'btn bs',onClick:function(){setEditId(null);setLbl('');setColor(COLORS[0]);setIcon(ICONS[0]);}},'Cancel'))
        )
      )
    )
  );
}

/* ════════════════════════════════════════
   ERROR BOUNDARY + MOUNT
════════════════════════════════════════ */
class ErrorBoundary extends R.Component{
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return {err:err};}
  render(){
    if(this.state.err){
      return h('div',{style:{padding:40,fontFamily:'monospace',color:'#ef4444',background:'#fef2f2',minHeight:'100vh'}},
        h('h2',{style:{marginBottom:12}},'❌ App Error'),
        h('pre',{style:{whiteSpace:'pre-wrap',fontSize:13}},this.state.err.toString()),
        h('button',{style:{marginTop:16,padding:'8px 16px',background:'#6366f1',color:'#fff',border:'none',borderRadius:8,cursor:'pointer'},onClick:function(){window.location.reload();}},'Reload Page')
      );
    }
    return this.props.children;
  }
}
var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(ErrorBoundary,null,h(App,null)));
})();
